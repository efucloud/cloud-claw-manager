name: Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: web/yarn.lock

      - name: Enable Yarn 1.x
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Build and embed web assets
        run: ./scripts/build-web-embed.sh

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set GHCR package visibility to public
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner.toLowerCase();
            const repo = context.repo.repo.toLowerCase();
            const candidates = [repo, `${owner}/${repo}`];
            const failures = [];
            let updated = false;

            for (const packageName of candidates) {
              try {
                await github.request('PATCH /orgs/{org}/packages/{package_type}/{package_name}/visibility', {
                  org: owner,
                  package_type: 'container',
                  package_name: packageName,
                  visibility: 'public',
                });
                core.info(`Set org package visibility to public: ${owner}/${packageName}`);
                updated = true;
                break;
              } catch (err) {
                failures.push(`org:${packageName}:${err.status || 'unknown'}:${err.message}`);
              }
            }

            if (!updated) {
              for (const packageName of candidates) {
                try {
                  await github.request('PATCH /user/packages/{package_type}/{package_name}/visibility', {
                    package_type: 'container',
                    package_name: packageName,
                    visibility: 'public',
                  });
                  core.info(`Set user package visibility to public: ${packageName}`);
                  updated = true;
                  break;
                } catch (err) {
                  failures.push(`user:${packageName}:${err.status || 'unknown'}:${err.message}`);
                }
              }
            }

            if (!updated) {
              core.warning(`Unable to set GHCR visibility to public automatically. ${failures.join(' | ')}`);
              core.warning('Image push is not blocked. If needed, set package visibility to public manually in GitHub Packages settings.');
            }
